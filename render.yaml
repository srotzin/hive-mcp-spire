services:
  - type: web
    name: hive-mcp-spire
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HIVE_SIGNER_URL
        value: https://hive-typed-signer.onrender.com
      - key: ENABLE
        value: "true"
